<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — ShopHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main class="page-container">
        <div class="admin-layout">
            <div class="admin-sidebar">
                <div class="admin-brand">
                    <div class="logo-icon" style="width:32px;height:32px;font-size:.8rem;border-radius:8px;"><i
                            class="fas fa-store"></i></div>
                    <span style="font-weight:800;font-size:1.15rem;color:var(--text);letter-spacing:-0.5px;">Shop<span
                            style="color:var(--primary)">Hub</span> Admin</span>
                </div>
                <h3 style="margin-top:8px;">Main Menu</h3>
                <a href="#" class="active" onclick="showTab('dash',this);return false"><i class="fas fa-chart-pie"></i>
                    Dashboard</a>
                <a href="#" onclick="showTab('prods',this);return false"><i class="fas fa-box-open"></i> Products</a>
                <a href="#" onclick="showTab('ords',this);return false"><i class="fas fa-receipt"></i> Orders</a>
                <a href="#" onclick="showTab('usrs',this);return false"><i class="fas fa-users"></i> Customers</a>
            </div>

            <div class="admin-content" id="adminC">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal-overlay" id="prodModal" style="display:none">
        <div class="modal modal-admin">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <h2 id="modTitle"><i class="fas fa-plus-circle"></i> Add Product</h2>
            <form onsubmit="saveProd(event)">
                <input type="hidden" id="editId">
                <div class="form-group"><label>Product Name</label><input type="text" id="pName" required
                        maxlength="200"></div>
                <div class="form-group"><label>Description</label><textarea id="pDesc" required
                        maxlength="2000"></textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>Price ($)</label><input type="number" id="pPrice" required min="0"
                            step="0.01"></div>
                    <div class="form-group"><label>Compare Price ($)</label><input type="number" id="pComp" min="0"
                            step="0.01" value="0"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Category</label>
                        <select id="pCat" required>
                            <option value="Electronics">Electronics</option>
                            <option value="Clothing">Clothing</option>
                            <option value="Books">Books</option>
                            <option value="Home">Home</option>
                            <option value="Sports">Sports</option>
                            <option value="Toys">Toys</option>
                            <option value="Beauty">Beauty</option>
                            <option value="Food">Food</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Stock</label><input type="number" id="pStock" required min="0"
                            value="0"></div>
                </div>
                <div class="form-group"><label>Image URL</label><input type="url" id="pImg" placeholder="https://...">
                </div>
                <div class="form-group"><label style="cursor:pointer"><input type="checkbox" id="pFeat"
                            style="margin-right:8px;accent-color:var(--primary)"> Featured Product</label></div>
                <div style="display:flex;gap:12px">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Product</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar();
            if (!Api.isLoggedIn() || !Api.isAdmin()) { location.href = '/'; return; }
            loadDash();
        });

        function showTab(tab, el) {
            document.querySelectorAll('.admin-sidebar a').forEach(a => a.classList.remove('active'));
            if (el) el.classList.add('active');
            ({ dash: loadDash, prods: loadProds, ords: loadOrds, usrs: loadUsrs })[tab]();
        }

        async function loadDash() {
            const c = document.getElementById('adminC'); showLoading(c);
            try {
                const d = await Api.get('/admin/stats'), s = d.stats;
                c.innerHTML = `
                <div style="margin-bottom:28px">
                    <h2 style="font-size:1.6rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;">Dashboard Overview</h2>
                    <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">Welcome back, here's what's happening today.</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon-wrap" style="background:var(--primary-light);color:var(--primary)"><i class="fas fa-wallet"></i></div>
                        <div class="stat-info"><span class="stat-label">Total Revenue</span><span class="stat-value">${formatPrice(s.totalRevenue)}</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrap" style="background:var(--success-bg);color:var(--success)"><i class="fas fa-shopping-cart"></i></div>
                        <div class="stat-info"><span class="stat-label">Total Orders</span><span class="stat-value">${s.totalOrders}</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrap" style="background:var(--info-bg);color:var(--info)"><i class="fas fa-box-open"></i></div>
                        <div class="stat-info"><span class="stat-label">Products</span><span class="stat-value">${s.totalProducts}</span></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrap" style="background:var(--warning-bg);color:var(--warning)"><i class="fas fa-users"></i></div>
                        <div class="stat-info"><span class="stat-label">Customers</span><span class="stat-value">${s.totalUsers}</span></div>
                    </div>
                </div>

                <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:24px;margin-top:10px;">
                    <div class="admin-panel-section" style="margin-bottom:0;">
                        <div class="admin-panel-header">
                            <h3><i class="fas fa-receipt" style="color:var(--text-muted);"></i> Recent Orders</h3>
                        </div>
                        <div class="table-wrap"><table class="admin-table"><thead><tr><th>Order</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead>
                        <tbody>${s.recentOrders.map(o => `<tr><td><strong style="color:var(--text)">#${o._id.slice(-6).toUpperCase()}</strong></td><td><div style="font-weight:600;color:var(--text)">${o.user?.name || 'N/A'}</div></td><td><strong style="color:var(--text)">${formatPrice(o.totalAmount)}</strong></td><td><span class="status-badge status-${o.status}">${o.status}</span></td></tr>`).join('')}</tbody></table></div>
                    </div>
                    
                    <div class="admin-panel-section" style="margin-bottom:0;">
                        <div class="admin-panel-header">
                            <h3><i class="fas fa-triangle-exclamation" style="color:var(--text-muted);"></i> Low Stock Alerts</h3>
                        </div>
                        ${!s.lowStock.length ? '<div class="empty-state" style="padding:30px 10px"><i class="fas fa-check-circle" style="color:var(--success);font-size:2rem;margin-bottom:10px"></i><div style="font-weight:600">Inventory is healthy</div></div>' : `
                        <div class="table-wrap"><table class="admin-table"><thead><tr><th>Product</th><th>Stock</th></tr></thead>
                        <tbody>${s.lowStock.map(p => `<tr><td><div style="font-weight:600;font-size:0.85rem;color:var(--text)">${p.name}</div></td><td><span style="background:${p.stock === 0 ? 'var(--danger-bg)' : 'var(--warning-bg)'};color:${p.stock === 0 ? 'var(--danger)' : 'var(--warning)'};padding:4px 10px;border-radius:20px;font-weight:700;font-size:0.75rem">${p.stock} left</span></td></tr>`).join('')}</tbody></table></div>`}
                    </div>
                </div>`;
            } catch (e) { c.innerHTML = `<p>Error: ${e.message}</p>`; }
        }

        async function loadProds() {
            const c = document.getElementById('adminC'); showLoading(c);
            try {
                const d = await Api.get('/admin/products');
                c.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
                    <div>
                        <h2 style="font-size:1.6rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;">Product Catalog</h2>
                        <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">Manage your inventory (${d.products.length} items).</p>
                    </div>
                    <button class="btn btn-primary btn-lg" onclick="openModal()" style="border-radius:var(--radius-full);box-shadow:0 4px 12px var(--primary-glow)"><i class="fas fa-plus"></i> Add Product</button>
                </div>
                <div class="admin-panel-section" style="padding:0; overflow:hidden;">
                    <div class="table-wrap" style="border:none;border-radius:0;"><table class="admin-table"><thead><tr><th>Product Details</th><th>Category</th><th>Price</th><th>Stock</th><th>Rating</th><th>Actions</th></tr></thead>
                    <tbody>${d.products.map(p => `<tr>
                        <td style="display:flex;align-items:center;gap:14px;">
                            <img src="${p.image}" alt="" style="width:48px;height:48px;border-radius:12px;box-shadow:var(--shadow-sm)" onerror="this.src='https://placehold.co/48x48/e2e8f0/64748b?text=P'">
                            <div>
                                <div style="font-weight:600;color:var(--text);font-size:0.95rem;">${p.name} ${p.featured ? '<i class="fas fa-star" style="color:var(--accent);font-size:0.7rem;margin-left:4px;" title="Featured"></i>' : ''}</div>
                                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">ID: ${p._id.slice(-8).toUpperCase()}</div>
                            </div>
                        </td>
                        <td><span style="background:var(--bg);padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;color:var(--text-secondary);"><i class="fas ${catIcon(p.category)}" style="margin-right:6px"></i>${p.category}</span></td>
                        <td><strong style="font-size:1rem;color:var(--text)">${formatPrice(p.price)}</strong></td>
                        <td><span style="background:${p.stock <= 5 ? 'var(--danger-bg)' : 'var(--success-bg)'};color:${p.stock <= 5 ? 'var(--danger)' : 'var(--success)'};padding:4px 10px;border-radius:20px;font-weight:700;font-size:0.75rem">${p.stock} in stock</span></td>
                        <td><div style="display:flex;align-items:center;gap:4px;">${starsHTML(p.rating)} <span style="color:var(--text-muted);font-size:0.75rem;font-weight:600;">(${p.numReviews})</span></div></td>
                        <td class="actions">
                            <button class="btn btn-sm btn-ghost" onclick='editProd(${JSON.stringify(p)})' style="background:var(--bg);color:var(--text-secondary);"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-sm btn-ghost" onclick="delProd('${p._id}')" style="background:var(--danger-bg);color:var(--danger);"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`).join('')}</tbody></table></div>
                </div>`;
            } catch (e) { c.innerHTML = `<p>Error: ${e.message}</p>`; }
        }

        async function loadOrds() {
            const c = document.getElementById('adminC'); showLoading(c);
            try {
                const d = await Api.get('/admin/orders');
                const orders = d.orders;

                c.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
                    <div>
                        <h2 style="font-size:1.6rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;">Orders Management</h2>
                        <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">Track and fulfill customer orders.</p>
                    </div>
                    <div style="display:flex;gap:4px;flex-wrap:wrap;background:var(--bg-card);padding:6px;border-radius:var(--radius-full);border:1px solid var(--border-light);box-shadow:var(--shadow-xs);">
                        <button class="btn btn-sm" style="border-radius:20px;background:${!orderFilter ? 'var(--primary)' : 'transparent'};color:${!orderFilter ? 'white' : 'var(--text-secondary)'};box-shadow:none;" onclick="orderFilter='';loadOrds()">All</button>
                        <button class="btn btn-sm" style="border-radius:20px;background:${orderFilter === 'pending' ? 'var(--primary)' : 'transparent'};color:${orderFilter === 'pending' ? 'white' : 'var(--text-secondary)'};box-shadow:none;" onclick="orderFilter='pending';loadOrds()">Pending</button>
                        <button class="btn btn-sm" style="border-radius:20px;background:${orderFilter === 'processing' ? 'var(--primary)' : 'transparent'};color:${orderFilter === 'processing' ? 'white' : 'var(--text-secondary)'};box-shadow:none;" onclick="orderFilter='processing';loadOrds()">Processing</button>
                        <button class="btn btn-sm" style="border-radius:20px;background:${orderFilter === 'shipped' ? 'var(--primary)' : 'transparent'};color:${orderFilter === 'shipped' ? 'white' : 'var(--text-secondary)'};box-shadow:none;" onclick="orderFilter='shipped';loadOrds()">Shipped</button>
                    </div>
                </div>

                <div class="admin-panel-section" style="padding:0; overflow:hidden;">
                ${!filteredOrders(orders).length ?
                        '<div class="empty-state" style="padding:60px"><div class="empty-icon"><i class="fas fa-inbox"></i></div><h2>No orders found</h2></div>' :
                        `<div class="table-wrap" style="border:none;border-radius:0;"><table class="admin-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Items</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                            <th>Payment</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredOrders(orders).map(o => `
                        <tr>
                            <td><strong style="color:var(--text)">#${o._id.slice(-8).toUpperCase()}</strong></td>
                            <td>
                                <div style="font-weight:600;color:var(--text);font-size:0.9rem;">${o.user?.name || 'N/A'}</div>
                                <div style="font-size:.75rem;color:var(--text-muted)">${o.user?.email || ''}</div>
                            </td>
                            <td>
                                <span style="background:var(--bg);padding:4px 10px;border-radius:20px;font-weight:600;font-size:.75rem;color:var(--text-secondary);">
                                    ${o.items.length} item${o.items.length > 1 ? 's' : ''}
                                </span>
                            </td>
                            <td><strong style="font-size:1rem;color:var(--text)">${formatPrice(o.totalAmount)}</strong></td>
                            <td><span class="status-badge status-${o.status}"><i class="fas ${statusIcon(o.status)}"></i> ${o.status}</span></td>
                            <td><span class="status-badge status-${o.paymentStatus}"><i class="fas fa-credit-card"></i> ${o.paymentStatus}</span></td>
                            <td style="white-space:nowrap;font-size:.82rem;color:var(--text-muted);font-weight:500;">${new Date(o.createdAt).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-sm btn-ghost" onclick='openOrderModal(${JSON.stringify(o)})' style="background:var(--bg);color:var(--primary);font-weight:700;" title="Manage Order">
                                    <i class="fas fa-sliders-h"></i> Manage
                                </button>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table></div>`}</div>`;
            } catch (e) { c.innerHTML = `<p>Error: ${e.message}</p>`; }
        }

        async function loadUsrs() {
            const c = document.getElementById('adminC'); showLoading(c);
            try {
                const d = await Api.get('/admin/users');
                c.innerHTML = `
                <div style="margin-bottom:24px;">
                    <h2 style="font-size:1.6rem;font-weight:800;color:var(--text);letter-spacing:-0.5px;">User Directory</h2>
                    <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">Manage your registered customers and administrators.</p>
                </div>
                
                <div class="admin-panel-section" style="padding:0; overflow:hidden;">
                    <div class="table-wrap" style="border:none;border-radius:0;"><table class="admin-table"><thead><tr><th>User Profile</th><th>Contact Info</th><th>Role</th><th>Joined Date</th></tr></thead>
                    <tbody>${d.users.map(u => `<tr>
                        <td style="display:flex;align-items:center;gap:14px;">
                            <div style="width:44px;height:44px;border-radius:14px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;flex-shrink:0">${u.name[0].toUpperCase()}</div>
                            <div>
                                <strong style="color:var(--text);font-size:0.95rem;">${u.name}</strong>
                                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">ID: ${u._id.slice(-8).toUpperCase()}</div>
                            </div>
                        </td>
                        <td>
                            <div style="color:var(--text);font-size:0.85rem;font-weight:500;"><i class="fas fa-envelope" style="color:var(--text-muted);margin-right:8px;"></i>${u.email}</div>
                            <div style="color:var(--text-secondary);font-size:0.8rem;margin-top:4px;"><i class="fas fa-phone" style="color:var(--text-muted);margin-right:8px;"></i>${u.phone || 'No phone provided'}</div>
                        </td>
                        <td><span style="background:${u.role === 'admin' ? 'var(--primary-light)' : 'var(--bg)'};color:${u.role === 'admin' ? 'var(--primary)' : 'var(--text-secondary)'};padding:6px 14px;border-radius:20px;font-weight:700;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;">${u.role}</span></td>
                        <td style="color:var(--text-muted);font-size:0.85rem;font-weight:500;"><i class="far fa-calendar-alt" style="margin-right:6px;"></i>${new Date(u.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}</td>
                    </tr>`).join('')}</tbody></table></div>
                </div>`;
            } catch (e) { c.innerHTML = `<p>Error: ${e.message}</p>`; }
        }

        function openModal(p = null) {
            document.getElementById('modTitle').innerHTML = p ? '<i class="fas fa-pen-to-square"></i> Edit Product' : '<i class="fas fa-plus-circle"></i> Add Product';
            document.getElementById('editId').value = p ? p._id : '';
            document.getElementById('pName').value = p ? p.name : '';
            document.getElementById('pDesc').value = p ? p.description : '';
            document.getElementById('pPrice').value = p ? p.price : '';
            document.getElementById('pComp').value = p ? (p.comparePrice || 0) : '0';
            document.getElementById('pCat').value = p ? p.category : 'Electronics';
            document.getElementById('pStock').value = p ? p.stock : '0';
            document.getElementById('pImg').value = p ? (p.image || '') : '';
            document.getElementById('pFeat').checked = p ? p.featured : false;
            document.getElementById('prodModal').style.display = 'flex';
        }
        function editProd(p) { openModal(p); }
        function closeModal() { document.getElementById('prodModal').style.display = 'none'; }

        async function saveProd(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('pName').value, description: document.getElementById('pDesc').value,
                price: parseFloat(document.getElementById('pPrice').value), comparePrice: parseFloat(document.getElementById('pComp').value) || 0,
                category: document.getElementById('pCat').value, stock: parseInt(document.getElementById('pStock').value),
                image: document.getElementById('pImg').value || 'https://placehold.co/400x400/e2e8f0/64748b?text=Product',
                featured: document.getElementById('pFeat').checked
            };
            try {
                if (id) { await Api.put(`/admin/products/${id}`, data); showToast('Product updated!'); }
                else { await Api.post('/admin/products', data); showToast('Product created!'); }
                closeModal(); loadProds();
            } catch (e) { showToast(e.message, 'error'); }
        }

        async function delProd(id) {
            if (!confirm('Delete this product permanently?')) return;
            try { await Api.delete(`/admin/products/${id}`); showToast('Product deleted'); loadProds(); } catch (e) { showToast(e.message, 'error'); }
        }

        let orderFilter = '';

        function filteredOrders(orders) {
            if (!orderFilter) return orders;
            return orders.filter(o => o.status === orderFilter);
        }

        function statusIcon(status) {
            const icons = {
                pending: 'fa-clock',
                confirmed: 'fa-check',
                processing: 'fa-cog fa-spin',
                shipped: 'fa-truck',
                delivered: 'fa-check-double',
                cancelled: 'fa-times-circle'
            };
            return icons[status] || 'fa-circle';
        }

        function openOrderModal(order) {
            // Remove existing modal if any
            const existing = document.getElementById('orderUpdateModal');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'orderUpdateModal';
            overlay.onclick = function (e) { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
    <div class="modal modal-admin" style="max-width:640px">
        <button class="modal-close" onclick="document.getElementById('orderUpdateModal').remove()">
            <i class="fas fa-times"></i>
        </button>

        <h2><i class="fas fa-pen-to-square"></i> Update Order #${order._id.slice(-8).toUpperCase()}</h2>

        <!-- Order Info -->
        <div style="background:var(--bg);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px;border:1px solid var(--border-light)">
            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
                <div>
                    <div style="font-weight:700;font-size:1rem">${order.user?.name || 'Unknown Customer'}</div>
                    <div style="color:var(--text-muted);font-size:.82rem">${order.user?.email || ''}</div>
                </div>
                <div style="text-align:right">
                    <div style="font-weight:800;font-size:1.1rem;color:var(--primary)">${formatPrice(order.totalAmount)}</div>
                    <div style="color:var(--text-muted);font-size:.82rem">${new Date(order.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
                </div>
            </div>

            <!-- Order Items -->
            <div style="border-top:1px solid var(--border-light);padding-top:12px">
                ${order.items.map(item => `
                <div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.88rem">
                    <img src="${item.image}" alt="" style="width:36px;height:36px;border-radius:6px;object-fit:cover" onerror="this.src='https://placehold.co/36x36/e2e8f0/64748b?text=•'">
                    <span style="flex:1">${item.name}</span>
                    <span style="color:var(--text-muted)">×${item.quantity}</span>
                    <span style="font-weight:600">${formatPrice(item.price * item.quantity)}</span>
                </div>`).join('')}
            </div>

            <!-- Shipping Address -->
            <div style="border-top:1px solid var(--border-light);padding-top:12px;margin-top:8px;font-size:.85rem;color:var(--text-secondary)">
                <i class="fas fa-map-marker-alt" style="color:var(--primary);margin-right:6px"></i>
                ${order.shippingAddress.street}, ${order.shippingAddress.city}, ${order.shippingAddress.state} ${order.shippingAddress.zip}, ${order.shippingAddress.country}
            </div>

            ${order.notes ? `<div style="border-top:1px solid var(--border-light);padding-top:12px;margin-top:8px;font-size:.85rem;color:var(--text-secondary)"><i class="fas fa-sticky-note" style="color:var(--accent);margin-right:6px"></i> ${order.notes}</div>` : ''}
        </div>

        <!-- Status Timeline -->
        <div style="margin-bottom:20px">
            <label style="font-weight:600;font-size:.88rem;display:block;margin-bottom:8px;color:var(--text)">
                <i class="fas fa-timeline" style="color:var(--primary);margin-right:6px"></i> Order Progress
            </label>
            <div style="display:flex;gap:4px;flex-wrap:wrap" id="statusTimeline">
                ${['pending', 'confirmed', 'processing', 'shipped', 'delivered'].map(s => {
                const isActive = s === order.status;
                const isPast = getStatusIndex(s) < getStatusIndex(order.status);
                const isCancelled = order.status === 'cancelled';
                return `<div style="
                        flex:1;min-width:80px;padding:8px 4px;text-align:center;border-radius:var(--radius);font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px;
                        background:${isActive ? 'var(--primary)' : isPast ? 'var(--success-bg)' : 'var(--bg)'};
                        color:${isActive ? 'white' : isPast ? 'var(--success)' : 'var(--text-muted)'};
                        border:1px solid ${isActive ? 'var(--primary)' : isPast ? 'var(--success)' : 'var(--border)'};
                        ${isCancelled ? 'opacity:.4' : ''}
                    ">
                        <i class="fas ${statusIcon(s)}" style="display:block;font-size:.9rem;margin-bottom:4px"></i>
                        ${s}
                    </div>`;
            }).join('')}
            </div>
            ${order.status === 'cancelled' ? '<div style="text-align:center;margin-top:8px;color:var(--danger);font-weight:600;font-size:.85rem"><i class="fas fa-times-circle"></i> This order was cancelled</div>' : ''}
        </div>

        <!-- Update Form -->
        <form onsubmit="submitOrderUpdate(event, '${order._id}')">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-truck"></i> Order Status</label>
                    <select id="updStatus">
                        ${['pending', 'confirmed', 'processing', 'shipped', 'delivered', 'cancelled'].map(s =>
                `<option value="${s}" ${order.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`
            ).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-credit-card"></i> Payment Status</label>
                    <select id="updPayment">
                        ${['pending', 'paid', 'failed', 'refunded'].map(s =>
                `<option value="${s}" ${order.paymentStatus === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`
            ).join('')}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-barcode"></i> Tracking Number</label>
                <input type="text" id="updTracking" value="${order.trackingNumber || ''}" placeholder="Enter tracking number (optional)">
            </div>

            <div style="display:flex;gap:10px;margin-top:8px">
                <button type="submit" class="btn btn-primary" id="updOrderBtn">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('orderUpdateModal').remove()">
                    Cancel
                </button>
            </div>
        </form>
    </div>`;

            document.body.appendChild(overlay);
        }

        function getStatusIndex(status) {
            const order = ['pending', 'confirmed', 'processing', 'shipped', 'delivered', 'cancelled'];
            return order.indexOf(status);
        }

        async function submitOrderUpdate(e, orderId) {
            e.preventDefault();
            const btn = document.getElementById('updOrderBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                const data = {
                    status: document.getElementById('updStatus').value,
                    paymentStatus: document.getElementById('updPayment').value,
                    trackingNumber: document.getElementById('updTracking').value
                };

                const result = await Api.put(`/admin/orders/${orderId}`, data);

                showToast(result.message || 'Order updated successfully! ✅');
                document.getElementById('orderUpdateModal').remove();
                loadOrds(); // Refresh the orders table
            } catch (e) {
                showToast(e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }
        }

        async function updOrdStatus(id, status) { try { await Api.put(`/admin/orders/${id}`, { status }); showToast(`Status → ${status}`); } catch (e) { showToast(e.message, 'error'); loadOrds(); } }
        async function markPaid(id) { try { await Api.put(`/admin/orders/${id}`, { paymentStatus: 'paid' }); showToast('Marked as paid ✓'); loadOrds(); } catch (e) { showToast(e.message, 'error'); } }
    </script>
</body>

</html>
