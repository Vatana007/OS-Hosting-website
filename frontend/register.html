<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — ShopHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"
                    style="width:52px;height:52px;font-size:1.3rem;margin:0 auto 14px;border-radius:16px"><i
                        class="fas fa-store"></i></div>
                <div class="logo" style="justify-content:center;font-size:1.4rem">Shop<span>Hub</span></div>
            </div>
            <h1>Create Account</h1>
            <p class="auth-subtitle">Join ShopHub and start shopping</p>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe" maxlength="50">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" required placeholder="At least 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Re-enter password" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="regBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            <p class="auth-footer">
                Already have an account? <a href="/login.html">Sign in <i class="fas fa-arrow-right"
                        style="font-size:.7rem"></i></a>
            </p>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        if (Api.isLoggedIn()) location.href = '/';

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            try {
                const pw = document.getElementById('password').value;
                if (pw !== document.getElementById('confirmPassword').value) throw new Error('Passwords do not match');
                const data = await Api.post('/auth/register', {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    password: pw
                });
                Api.setToken(data.token);
                Api.setUser(data.user);
                showToast('Account created! Welcome! 🎉');
                setTimeout(() => location.href = '/', 700);
            } catch (e) {
                showToast(e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        }
    </script>
</body>

</html>
