<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — ShopHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main class="page-container">
        <h1 class="section-title"><i class="fas fa-lock"></i> Secure Checkout</h1>
        <p class="section-subtitle">Complete your order</p>
        <div id="checkoutContent">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar(); renderFooter();
            if (!Api.isLoggedIn()) { location.href = '/login.html'; return; }
            loadCheckout();
        });

        async function loadCheckout() {
            const c = document.getElementById('checkoutContent');
            try {
                const [cr, ur] = await Promise.all([Api.get('/cart'), Api.get('/auth/me')]);
                const cart = cr.cart, user = ur.user;
                if (!cart.length) { c.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-shopping-bag"></i></div><h2>Cart is empty</h2><a href="/" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> Go Shopping</a></div>`; return; }

                const sub = cart.reduce((s, i) => s + i.product.price * i.quantity, 0);
                const ship = sub > 50 ? 0 : 9.99, tax = sub * 0.08, total = sub + ship + tax;

                c.innerHTML = `<form onsubmit="placeOrder(event)"><div class="checkout-layout"><div>
                    <div class="checkout-section"><h2><i class="fas fa-truck"></i> Shipping Address</h2>
                        <div class="form-group"><label><i class="fas fa-road"></i> Street</label><input type="text" id="street" required value="${user.address?.street || ''}" placeholder="123 Main Street"></div>
                        <div class="form-row"><div class="form-group"><label><i class="fas fa-city"></i> City</label><input type="text" id="city" required value="${user.address?.city || ''}" placeholder="New York"></div>
                        <div class="form-group"><label><i class="fas fa-map"></i> State</label><input type="text" id="state" required value="${user.address?.state || ''}" placeholder="NY"></div></div>
                        <div class="form-row"><div class="form-group"><label><i class="fas fa-hashtag"></i> ZIP</label><input type="text" id="zip" required value="${user.address?.zip || ''}" placeholder="10001"></div>
                        <div class="form-group"><label><i class="fas fa-globe"></i> Country</label><input type="text" id="country" required value="${user.address?.country || 'US'}" placeholder="US"></div></div>
                    </div>
                    <div class="checkout-section"><h2><i class="fas fa-credit-card"></i> Payment Method</h2>
                        <div class="payment-options">
                            <label class="payment-option selected" onclick="selPay(this)"><input type="radio" name="pay" value="cod" checked><i class="fas fa-money-bill-wave"></i><div><strong>Cash on Delivery</strong><br><small style="color:var(--text-muted)">Pay when you receive</small></div></label>
                            <label class="payment-option" onclick="selPay(this)"><input type="radio" name="pay" value="card"><i class="fas fa-credit-card"></i><div><strong>Credit / Debit Card</strong><br><small style="color:var(--text-muted)">Visa, Mastercard, Amex</small></div></label>
                            <label class="payment-option" onclick="selPay(this)"><input type="radio" name="pay" value="paypal"><i class="fab fa-paypal"></i><div><strong>PayPal</strong><br><small style="color:var(--text-muted)">Pay with PayPal</small></div></label>
                        </div>
                    </div>
                    <div class="checkout-section"><h2><i class="fas fa-sticky-note"></i> Order Notes</h2><div class="form-group"><textarea id="notes" placeholder="Special instructions (optional)..."></textarea></div></div>
                </div><div>
                    <div class="order-summary"><h3><i class="fas fa-receipt"></i> Order Summary</h3>
                        ${cart.map(i => `<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:.88rem;border-bottom:1px solid var(--border-light)"><span style="flex:1">${i.product.name} <span style="color:var(--text-muted)">×${i.quantity}</span></span><span style="font-weight:600">${formatPrice(i.product.price * i.quantity)}</span></div>`).join('')}
                        <div class="summary-row" style="margin-top:14px"><span>Subtotal</span><span>${formatPrice(sub)}</span></div>
                        <div class="summary-row"><span>Shipping</span><span class="${ship === 0 ? 'free-ship' : ''}">${ship === 0 ? 'FREE' : formatPrice(ship)}</span></div>
                        <div class="summary-row"><span>Tax (8%)</span><span>${formatPrice(tax)}</span></div>
                        <div class="summary-row total"><span>Total</span><span>${formatPrice(total)}</span></div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:20px" id="placeBtn"><i class="fas fa-check-circle"></i> Place Order — ${formatPrice(total)}</button>
                        <p style="text-align:center;margin-top:12px;color:var(--text-muted);font-size:.78rem"><i class="fas fa-shield-halved"></i> Your info is encrypted & secure</p>
                    </div>
                </div></div></form>`;
            } catch (e) { c.innerHTML = `<div class="empty-state"><p>Error: ${e.message}</p></div>`; }
        }

        function selPay(el) { document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected')); el.classList.add('selected'); }

        async function placeOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('placeBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            try {
                const addr = { street: document.getElementById('street').value, city: document.getElementById('city').value, state: document.getElementById('state').value, zip: document.getElementById('zip').value, country: document.getElementById('country').value };
                await Api.post('/orders', { shippingAddress: addr, paymentMethod: document.querySelector('input[name="pay"]:checked').value, notes: document.getElementById('notes').value });
                try { await Api.put('/auth/profile', { address: addr }); } catch (e) { }
                showToast('Order placed successfully! 🎉');
                setTimeout(() => location.href = '/orders.html', 1200);
            } catch (e) { showToast(e.message, 'error'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> Place Order'; }
        }
    </script>
</body>

</html>
